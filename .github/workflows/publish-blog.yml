name: Auto-Generate & Publish Blog Post

on:
  schedule:
    - cron: '0 0 * * *'   # Har roz midnight UTC (5am Pakistan time)
  workflow_dispatch:        # GitHub UI se manually bhi trigger kar sakte hain

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate SEO blog post via Claude AI
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-blog.js

      - name: Commit and push new blog post
        run: |
          git config user.name "Duck Book Writers Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/blogs.json
          git diff --staged --quiet && echo "No changes to commit." || (
            git commit -m "chore: auto-publish AI blog post [$(date +%Y-%m-%d)]" &&
            git push
          )
